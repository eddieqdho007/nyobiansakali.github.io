  <style>
    :root {
      --primary-color: rgba(255, 255, 255, 0.1);
      --secondary-color: rgba(255, 255, 255, 0.05);
      --hover-color: rgba(255, 255, 255, 0.2);
      --text-color: #ffffff;
      --light-text: #b0b3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(180deg, #121212 0%, #1B2835 50%, #121212 100%);
      color: var(--text-color);
      text-align: center;
      padding: 30px 15px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      
      padding: 35px 25px 20px;
      display: flex;
      flex-direction: column;
      height: 90vh;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 20px;
      color: var(--text-color);
      font-weight: 600;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .scrollable-buttons {
      flex: 1;
      overflow-y: auto;
      padding: 10px 5px;
      margin-bottom: 1px;
      margin-top: 1px;
    }

    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      margin-bottom: 10px;
      margin-top: 10px;
    }

    .btn {
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 4px 6px rgba(0, 0, 0, 0.2);
    }

    .btn:hover {
      background: var(--hover-color);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(27, 40, 53, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.2);
    }

    .btn:active {
      transform: translateY(-1px) scale(0.98);
    }

    .btn:disabled, .disabled-btn {
      opacity: 0.25;
      background: rgba(255, 255, 255, 0.02);
      color: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: none;
      cursor: not-allowed;
      pointer-events: none;
      transform: none !important;
    }

    .footer {
      margin-top: auto;
      color: var(--light-text);
      font-size: 0.8rem;
      padding-top: 20px;
      opacity: 0.8;
    }

    .scrollable-buttons::-webkit-scrollbar {
      width: 6px;
    }

    .scrollable-buttons::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }

    .scrollable-buttons::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .scrollable-buttons::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    @media (max-width: 350px) {
      .buttons-grid {
        gap: 8px;
      }

      .btn {
        font-size: 1rem;
      }
    }

    .garis-1, .garis-2 {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
