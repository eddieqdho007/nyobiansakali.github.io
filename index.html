<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulasi Ujian EPS-TOPIK</title>
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-bg-hover: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-color: #ffffff;
      --light-text: rgba(255, 255, 255, 0.65);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: 15px;

      background: linear-gradient(180deg,
          #121212 0%,
          #1B2835 50%,
          #121212 100%);

      color: var(--text-color);

      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
    }

    body::before {
      width: 420px;
      height: 420px;
      top: -120px;
      left: -120px;
      background: rgba(0, 180, 255, 0.18);
    }

    body::after {
      width: 380px;
      height: 380px;
      bottom: -100px;
      right: -100px;
      background: rgba(0, 90, 255, 0.18);
    }

    .container {
      width: 100%;
      max-width: 1200px;
      height: 92vh;

      display: flex;
      flex-direction: column;

      padding: 25px;

      background: rgba(255, 255, 255, 0.05);

      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);

      border: 1px solid rgba(255, 255, 255, 0.12);

      border-radius: 30px;

      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }

    h1 {
      text-align: center;
      color: #fff;

      font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 700;

      letter-spacing: 1px;

      margin-bottom: 18px;
    }

    .garis-1,
    .garis-2 {
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .scrollable-buttons {
      flex: 1;

      overflow-y: auto;

      padding: 10px 4px;

      margin: 8px 0;

      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, .25) transparent;
    }

    .scrollable-buttons::-webkit-scrollbar {
      width: 6px;
    }

    .scrollable-buttons::-webkit-scrollbar-track {
      background: transparent;
    }

    .scrollable-buttons::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .25);
      border-radius: 999px;
    }

    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 12px;
      width: 100%;
    }

    .btn {
      width: 100%;
      height: 0;
      padding-bottom: 100%;

      position: relative;

      border-radius: 18px;

      border: 1px solid var(--glass-border);

      background: var(--glass-bg);

      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);

      color: #fff;

      cursor: pointer;

      transition: all .3s ease;

      box-shadow:
        0 4px 15px rgba(0, 0, 0, 0.25),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }

    .btn.disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;

      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.08);

      filter: grayscale(0.7);
    }

    .btn.disabled:hover {
      transform: none;
      box-shadow:
        0 4px 15px rgba(0, 0, 0, 0.15),
        inset 0 1px 1px rgba(255, 255, 255, 0.05);
    }

    .btn::before {
      content: "";

      position: absolute;

      top: 0;
      left: 0;
      right: 0;

      height: 45%;

      border-radius: 18px 18px 50% 50%;

      background: linear-gradient(to bottom,
          rgba(255, 255, 255, .18),
          transparent);

      pointer-events: none;
    }

    .btn span {
      position: absolute;

      top: 50%;
      left: 50%;

      transform: translate(-50%, -50%);

      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 700;

      color: #fff;
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.04);

      background: var(--glass-bg-hover);

      border-color: rgba(255, 255, 255, .28);

      box-shadow:
        0 10px 25px rgba(0, 0, 0, .35),
        0 0 20px rgba(0, 150, 255, .18);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .footer {
      text-align: center;

      color: var(--light-text);

      font-size: .85rem;

      padding-top: 15px;
    }

    @media (max-width: 480px) {

      body {
        padding: 10px;
      }

      .container {
        height: 95vh;
        padding: 18px;
        border-radius: 24px;
      }

      .buttons-grid {
        grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
        gap: 10px;
      }

      body::before {
        width: 260px;
        height: 260px;
      }

      body::after {
        width: 240px;
        height: 240px;
      }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .buttons-grid {
        grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
      }
    }

    @media (min-width: 1400px) {
      .buttons-grid {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      }
    }
  </style>
</head>
